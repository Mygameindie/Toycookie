<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dress-Up Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <div class="main-menu">
    <img src="Mainmenu.png" alt="Main Menu">
    <button onclick="enterGame()">Play</button>
  </div>

  <div class="game-container">
    <div class="stage">
      <!-- Character 1 (girl) -->
      <div class="char-wrap" id="char1" data-char="1" data-gender="girl">
        <img class="base-img" id="base1" src="base1.png" alt="Character 1">
        <button class="belly-btn" data-char="1"></button>
        <img id="bottomunderwear1_1.png" src="bottomunderwear1_1.png" class="bottomunderwear1" alt="Bottom Underwear 1 Item 1"
             style="visibility:visible;position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none;z-index:30;">
        <img id="topunderwear1_1.png" src="topunderwear1_1.png" class="topunderwear1" alt="Top Underwear 1 Item 1"
             style="visibility:visible;position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none;z-index:40;">
      </div>
      <!-- Character 2 (boy) -->
      <div class="char-wrap" id="char2" data-char="2" data-gender="boy">
        <img class="base-img" id="base2" src="base2.png" alt="Character 2">
        <button class="belly-btn" data-char="2"></button>
        <img id="bottomunderwear2_1.png" src="bottomunderwear2_1.png" class="bottomunderwear2" alt="Bottom Underwear 2 Item 1"
             style="visibility:visible;position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none;z-index:30;">
      </div>
      <!-- Character 4 (girl) -->
      <div class="char-wrap" id="char4" data-char="4" data-gender="girl">
        <img class="base-img" id="base4" src="base4.png" alt="Character 4">
        <button class="belly-btn" data-char="4"></button>
        <img id="bottomunderwear4_1.png" src="bottomunderwear4_1.png" class="bottomunderwear4" alt="Bottom Underwear 4 Item 1"
             style="visibility:visible;position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none;z-index:30;">
        <img id="topunderwear4_1.png" src="topunderwear4_1.png" class="topunderwear4" alt="Top Underwear 4 Item 1"
             style="visibility:visible;position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none;z-index:40;">
      </div>
    </div>

    <div class="toolbar">
      <button id="wind-button">🌬 Wind</button>
    </div>

    <div class="controls">
      <div class="scroll-bar" id="presetScrollBar"></div>
      <div class="scroll-bar" id="categoryScrollBar"></div>
      <div class="scrollable-buttons"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="defaults.js"></script>
  <script src="preset.js"></script>
  <script src="scrolls.js"></script>
  <script src="toys.js"></script>
</body>
</html>
